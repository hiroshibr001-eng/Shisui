name: Build Vortek Mali Wrapper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu libvulkan-dev zstd tar zip file xxd

      - name: Extract original Vortek ICD and create embedded blob
        run: |
          test -f vortek-2.1.tzst
          rm -rf work_original
          mkdir -p work_original
          tar --use-compress-program=unzstd -xf vortek-2.1.tzst -C work_original
          test -f work_original/usr/lib/libvulkan_vortek.so
          xxd -i -n vortek_real_so work_original/usr/lib/libvulkan_vortek.so > src/vortek_real_blob.inc
          head -n 5 src/vortek_real_blob.inc

      - name: Build embedded wrapper aarch64 glibc
        run: |
          aarch64-linux-gnu-gcc -O2 -fPIC -shared \
            src/vortek_mali_wrapper.c \
            -o libvulkan_vortek.so \
            -ldl
          file libvulkan_vortek.so
          aarch64-linux-gnu-readelf -h libvulkan_vortek.so | head -n 30
          aarch64-linux-gnu-readelf -Ws libvulkan_vortek.so | grep -E "vk_icdGetInstanceProcAddr|vk_icdNegotiateLoaderICDInterfaceVersion|vkGetInstanceProcAddr|vkGetDeviceProcAddr|vkMapMemory" || true

      - name: Repack vortek-2.1.tzst
        run: |
          mkdir -p artifact
          cp libvulkan_vortek.so artifact/libvulkan_vortek_mali_wrapper_embedded.so

          mkdir -p work_vortek
          tar --use-compress-program=unzstd -xf vortek-2.1.tzst -C work_vortek
          test -f work_vortek/usr/lib/libvulkan_vortek.so

          mkdir -p work_vortek/lib
          cp work_vortek/usr/lib/libvulkan_vortek.so work_vortek/usr/lib/libvulkan_vortek_original_backup.so
          cp libvulkan_vortek.so work_vortek/usr/lib/libvulkan_vortek.so
          cp libvulkan_vortek.so work_vortek/lib/libvulkan_vortek.so

          tar -C work_vortek --use-compress-program="zstd -19" -cf artifact/vortek-2.1-mali-wrapper.tzst .
          tar --use-compress-program=unzstd -tf artifact/vortek-2.1-mali-wrapper.tzst | grep -E "libvulkan_vortek"
          zip -r vortek-mali-wrapper-artifact.zip artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vortek-mali-wrapper-artifact
          path: vortek-mali-wrapper-artifact.zip
